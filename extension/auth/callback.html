<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>iApply Extension Sign-In</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #eff6ff, #f8fafc);
      color: #111827;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 45px rgba(37, 99, 235, 0.12);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 0; line-height: 1.6; color: #4b5563; }
    .status {
      margin: 18px 0 0;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .actions { margin-top: 18px; display: flex; gap: 10px; }
    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .btn-primary { background: #2563eb; color: #ffffff; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connecting extension</h1>
    <p>We are signing this browser extension into your iApply account.</p>
    <div id="status" class="status">Waiting for authentication token...</div>
    <div class="actions">
      <a class="btn btn-primary" href="../popup/popup.html">Open Extension</a>
      <button id="closeBtn" class="btn btn-secondary" type="button">Close Tab</button>
    </div>
  </div>
  <script src="callback.js"></script>
</body>
</html>
